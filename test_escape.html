<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Test PasteListModal Escape Behavior</title>
  <!-- Load React, ReactDOM, and Babel to render the component -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // A simplified version of PasteListModal reflecting the change
    function PasteListModal({ onClose }) {
      useEffect(() => {
        const handleKeyDown = (e) => {
          if (e.key === 'Escape') onClose();
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [onClose]);

      return (
        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
          <div className="bg-white rounded-2xl max-w-2xl w-full max-h-[90vh] flex flex-col overflow-hidden relative shadow-2xl">
            {/* Header */}
            <div className="px-6 py-4 border-b border-gray-100 flex items-center justify-between shrink-0">
              <h2 id="paste-list-title" className="font-semibold text-gray-900">Paste a List</h2>
              <button
                onClick={onClose}
                className="p-2 text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-full transition-colors"
                aria-label="Close paste list modal"
              >
                ✕
              </button>
            </div>
            {/* Content placeholder */}
            <div className="p-6">
              <p>Try pressing the <strong>Escape</strong> key to close this modal!</p>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [isOpen, setIsOpen] = useState(true);

      return (
        <div>
          <button
            onClick={() => setIsOpen(true)}
            className="bg-blue-600 text-white px-4 py-2 rounded-lg font-medium hover:bg-blue-700 transition-colors"
          >
            Open Modal
          </button>
          {isOpen && <PasteListModal onClose={() => setIsOpen(false)} />}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
